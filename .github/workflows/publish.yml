name: Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: "1.95.0"
  TAUT_PYTHON: python

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout gwz-core
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$env:RUST_TOOLCHAIN" --profile minimal --component clippy --component rustfmt
          rustup default "$env:RUST_TOOLCHAIN"
        if: runner.os == 'Windows'

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy --component rustfmt
          rustup default "$RUST_TOOLCHAIN"
        if: runner.os != 'Windows'

      - name: Show Rust version
        run: rustc --version

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install taut-proto
        run: python -m pip install --upgrade pip taut-proto

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
